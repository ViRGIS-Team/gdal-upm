name: Build GDAL Android AAR (Clean Pipeline)

on:
  workflow_dispatch:

env:
  ANDROID_API: 21
  ANDROID_ABI: arm64-v8a
  NDK_VERSION: 26.1.10909125

jobs:

# =========================================================
# STAGE 1 — BUILD GDAL FOR ANDROID (NO VCPKG)
# =========================================================
  build-gdal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GDAL wrapper repo
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build git curl unzip \
            build-essential pkg-config perl

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;${NDK_VERSION}"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${NDK_VERSION}" >> $GITHUB_ENV

      # -----------------------------------------------------
      # Build GDAL natively for Android
      # -----------------------------------------------------
      - name: Clone GDAL source
        run: |
          git clone https://github.com/OSGeo/gdal.git
          cd gdal
          git checkout v3.8.5   # pin a stable version (important)

      - name: Configure GDAL (Android)
        run: |
          cd gdal
          mkdir build && cd build

          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${ANDROID_ABI} \
            -DANDROID_PLATFORM=android-${ANDROID_API} \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_TESTING=OFF \
            -DBUILD_CURL=OFF \
            -DGDAL_BUILD_OPTIONAL_DRIVERS=OFF \
            -DCMAKE_INSTALL_PREFIX=$PWD/install

      - name: Build GDAL
        run: |
          cd gdal/build
          cmake --build . --target install -- -j$(nproc)

      - name: Upload GDAL artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gdal-android-${{ env.ANDROID_ABI }}
          path: gdal/build/install


# =========================================================
# STAGE 2 — BUILD AAR (PURE PACKAGING, NO COMPILATION)
# =========================================================
  build-aar:
    needs: build-gdal
    runs-on: ubuntu-latest

    steps:
      - name: Checkout wrapper project
        uses: actions/checkout@v4

      - name: Download GDAL artifacts
        uses: actions/download-artifact@v4
        with:
          name: gdal-android-arm64-v8a
          path: gdal-prebuilt

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      # -----------------------------------------------------
      # Create Android Library (NO C++ COMPILATION HERE)
      # -----------------------------------------------------
      - name: Assemble Android library project
        run: |
          mkdir -p android-gdal/libs/arm64-v8a
          mkdir -p android-gdal/include

          cp -r gdal-prebuilt/lib/*.so android-gdal/libs/arm64-v8a/ || true
          cp -r gdal-prebuilt/include/* android-gdal/include/ || true

          # settings.gradle
          cat > android-gdal/settings.gradle <<EOF
rootProject.name = "gdal-android"
EOF

          # build.gradle
          cat > android-gdal/build.gradle <<EOF
plugins {
    id 'com.android.library'
    id 'maven-publish'
}

android {
    namespace "org.gdal"
    compileSdk 34

    defaultConfig {
        minSdk 21
        targetSdk 34

        ndk {
            abiFilters "arm64-v8a"
        }
    }

    sourceSets {
        main {
            jniLibs.srcDirs = ['libs']
            java.srcDirs = ['src']
        }
    }
}

publishing {
    publications {
        release(MavenPublication) {
            groupId = "com.github.${System.getenv('GITHUB_REPOSITORY_OWNER')}"
            artifactId = "gdal-android"
            version = "1.0.0"

            afterEvaluate {
                from components.release
            }
        }
    }
}
EOF

      # -----------------------------------------------------
      # JNI wrapper (kept minimal)
      # -----------------------------------------------------
      - name: Create JNI wrapper
        run: |
          mkdir -p android-gdal/src/main/java/org/gdal
          mkdir -p android-gdal/src/main/cpp

          cat > android-gdal/src/main/cpp/gdalwrapper.cpp <<EOF
#include <jni.h>
#include "gdal.h"

extern "C"
JNIEXPORT jstring JNICALL
Java_org_gdal_Gdal_version(JNIEnv* env, jobject) {
    const char* ver = GDALVersionInfo("RELEASE_NAME");
    return env->NewStringUTF(ver);
}
EOF

          cat > android-gdal/src/main/java/org/gdal/Gdal.java <<EOF
package org.gdal;

public class Gdal {
    static {
        System.loadLibrary("gdal");
    }

    public native String version();
}
EOF

      - name: Setup Gradle wrapper
        run: |
          cd android-gdal
          gradle wrapper --gradle-version 8.6

      - name: Build AAR
        run: |
          cd android-gdal
          ./gradlew assembleRelease

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: gdal-aar
          path: android-gdal/build/outputs/aar/*.aar
